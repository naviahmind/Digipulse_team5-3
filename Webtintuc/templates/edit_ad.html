{% extends "base.html" %}

{% block title %}Sửa quảng cáo – {{ ad.title }}{% endblock %}

{% block content %}
<div class="ea-wrap">
    <div class="cp-header">
        <h2>✏️ Chỉnh sửa quảng cáo</h2>
        <a href="{% url 'webtintuc:manage_ads' %}" class="btn-back">← Quay lại</a>
    </div>

    <div class="ea-card">
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <div class="fg">
                <label>Tiêu đề quảng cáo *</label>
                <input type="text" name="title" value="{{ ad.title }}" required>
            </div>

            <div class="fg">
                <label>Vị trí hiển thị *</label>
                <select name="position">
                    {% for val, label in position_choices %}
                    <option value="{{ val }}" {% if ad.position == val %}selected{% endif %}>{{ label }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="fg">
                <label>Hình ảnh banner</label>
                {% if ad.image %}
                <div class="current-image">
                    <img src="{{ ad.image.url }}" alt="{{ ad.title }}" style="max-width:200px;border-radius:6px;margin-bottom:8px;display:block;">
                    <small style="color:#888;">Ảnh hiện tại. Chọn file mới để thay thế.</small>
                </div>
                {% endif %}
                <input type="file" name="image" accept="image/*">
            </div>

            <div class="fg">
                <label>Link URL (khi click vào quảng cáo)</label>
                <input type="url" name="link_url" value="{{ ad.link_url|default:'' }}" placeholder="https://example.com">
            </div>

            <div class="fg-row">
                <div class="fg">
                    <label>Ngày bắt đầu</label>
                    <input type="date" name="start_date" value="{{ ad.start_date|date:'Y-m-d'|default:'' }}">
                </div>
                <div class="fg">
                    <label>Ngày kết thúc</label>
                    <input type="date" name="end_date" value="{{ ad.end_date|date:'Y-m-d'|default:'' }}">
                </div>
            </div>

            <div class="fg fg-checkbox">
                <label class="checkbox-label">
                    <input type="checkbox" name="is_active" {% if ad.is_active %}checked{% endif %}>
                    <span>Đang hiển thị (kích hoạt)</span>
                </label>
            </div>

            <div class="form-actions">
                <a href="{% url 'webtintuc:manage_ads' %}" class="btn-cancel">Hủy</a>
                <button type="submit" class="btn-save">💾 Lưu thay đổi</button>
            </div>
        </form>
    </div>
</div>

<style>
.ea-wrap { max-width: 600px; margin: 30px auto; padding: 0 15px 60px; }
.cp-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.cp-header h2 { font-size: 1.4rem; color: #2c3e50; }
.btn-back { background: #ecf0f1; color: #555; padding: 8px 16px; border-radius: 6px; text-decoration: none; font-size: 14px; }
.btn-back:hover { background: #dde; }
.ea-card { background: white; border-radius: 12px; padding: 30px; border: 1px solid #eee; box-shadow: 0 2px 8px rgba(0,0,0,.05); }
.fg { margin-bottom: 18px; }
.fg label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; }
.fg input[type="text"], .fg input[type="url"], .fg input[type="date"], .fg select { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; box-sizing: border-box; }
.fg input:focus, .fg select:focus { outline: none; border-color: #3498db; }
.fg-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.fg-checkbox { display: flex; align-items: center; }
.checkbox-label { display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 14px; color: #444; }
.checkbox-label input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; }
.current-image { margin-bottom: 10px; }
.form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 25px; padding-top: 20px; border-top: 1px solid #f0f0f0; }
.btn-cancel { background: #ecf0f1; color: #555; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 14px; text-decoration: none; }
.btn-save { background: #3498db; color: white; border: none; padding: 10px 24px; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600; }
.btn-save:hover { background: #2980b9; }
@media (max-width: 600px) { .fg-row { grid-template-columns: 1fr; } }
</style>
{% endblock %}
